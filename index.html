<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comment Wall App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-container">
      <h1>Comment wall</h1>

      <form id="comment-form" class="comment-form">
        <input
          type="text"
          id="username"
          placeholder="Tu nombre de usuario"
          autocomplete="off"
        />
        <textarea
          id="message"
          placeholder="Escribe tu comentario aquí (mínimo 5 caracteres)..."
          rows="3"
        ></textarea>
        <p id="error-msg" class="error-msg hidden"></p>
        <button type="submit" id="submit-btn">Publicar</button>
      </form>

      <section class="wall-section">
        <div id="empty-state" class="empty-state">
          No hay comentarios aún. ¡Sé el primero en publicar!
        </div>

        <div id="comments-list" class="comments-list hidden"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
